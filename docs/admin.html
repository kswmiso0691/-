<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>덴노트 | 상담 접수 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f5f5f5;
    color: #333;
    padding: 24px;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 900;
  }
  .header .count {
    background: #3B2723;
    color: #F5E6CA;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
  }
  .refresh-btn {
    background: #3B2723;
    color: #F5E6CA;
    border: none;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .refresh-btn:hover { opacity: 0.85; }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 14px;
  }
  .card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 14px;
    padding: 20px;
    position: relative;
  }
  .card .card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .card .card-id {
    font-size: 12px;
    color: #999;
    font-weight: 700;
  }
  .card .card-time {
    font-size: 12px;
    color: #999;
  }
  .card .clinic-name {
    font-size: 18px;
    font-weight: 900;
    margin-bottom: 4px;
  }
  .card .doctor-name {
    font-size: 14px;
    color: #666;
    margin-bottom: 12px;
  }
  .card .info-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    margin-bottom: 6px;
    color: #555;
  }
  .card .info-row .label {
    font-weight: 700;
    color: #3B2723;
    min-width: 60px;
  }
  .card .interest-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 10px;
  }
  .card .interest-tags span {
    background: #FAF5ED;
    border: 1px solid #E8E2DA;
    border-radius: 100px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 700;
    color: #6B5550;
  }
  .card .memo-text {
    margin-top: 10px;
    padding: 10px;
    background: #f9f9f9;
    border-radius: 8px;
    font-size: 13px;
    color: #666;
    line-height: 1.6;
  }
  .card .delete-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: #ccc;
    padding: 4px;
  }
  .card .delete-btn:hover { color: #ff4757; }
  .card .phone-link {
    color: #3B2723;
    text-decoration: none;
    font-weight: 700;
  }
  .card .phone-link:hover { text-decoration: underline; }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: #999;
    font-size: 16px;
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>상담 접수 관리</h1>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="count" id="totalCount">0건</span>
    <button class="refresh-btn" onclick="loadData()">새로고침</button>
  </div>
</div>

<div class="cards" id="cardList"></div>
<div class="empty" id="emptyMsg" style="display:none">접수된 상담이 없습니다.</div>

<script>
const interestMap = {
  abutment: '커스텀 어버트먼트 50%',
  implant: '임플란트 단품주문',
  marketing: '마케팅'
};

const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
const ADMIN_API = isLocal ? '/api/admin/consultations' : 'https://script.google.com/macros/s/AKfycbyJk8H-F5Q1PdurNwBpLHC7wT_8-FAsEEEyBb7lri-8NQ1MZufRFZyjWKy3pI-SxRGn-g/exec';

function loadData() {
  fetch(ADMIN_API)
    .then(r => r.json())
    .then(rows => {
      document.getElementById('totalCount').textContent = rows.length + '건';
      const container = document.getElementById('cardList');
      const empty = document.getElementById('emptyMsg');

      if (rows.length === 0) {
        container.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      container.innerHTML = rows.map(row => {
        let interests = [];
        try {
          if (typeof row.interest === 'string') {
            try { interests = JSON.parse(row.interest); } catch(e) {
              interests = row.interest.split(',').map(s => s.trim()).filter(Boolean);
            }
          } else if (Array.isArray(row.interest)) {
            interests = row.interest;
          }
        } catch(e) {}

        const tagsHtml = interests.map(i =>
          '<span>' + (interestMap[i] || i) + '</span>'
        ).join('');

        const time = new Date(row.submitted_at || row.created_at).toLocaleString('ko-KR');

        return `
          <div class="card">
            <button class="delete-btn" onclick="deleteItem(${row.id})" title="삭제">&times;</button>
            <div class="card-top">
              <span class="card-id">#${row.id}</span>
              <span class="card-time">${time}</span>
            </div>
            <div class="clinic-name">${esc(row.clinic)}</div>
            <div class="doctor-name">${esc(row.name)} 원장님</div>
            <div class="info-row">
              <span class="label">연락처</span>
              <a href="tel:${row.phone}" class="phone-link">${esc(row.phone)}</a>
            </div>
            ${row.cases ? `<div class="info-row"><span class="label">시술건수</span> 월 ${esc(row.cases)}건</div>` : ''}
            ${tagsHtml ? `<div class="interest-tags">${tagsHtml}</div>` : ''}
            ${row.memo ? `<div class="memo-text">${esc(row.memo)}</div>` : ''}
          </div>
        `;
      }).join('');
    });
}

function deleteItem(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  fetch('/api/admin/consultations/' + id, { method: 'DELETE' })
    .then(() => loadData());
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

loadData();
// 30초마다 자동 새로고침
setInterval(loadData, 30000);
</script>
</body>
</html>
