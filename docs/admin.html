<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>덴노트 | 상담 접수 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f5f5f5;
    color: #333;
    padding: 24px;
  }

  /* 헤더 */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .header h1 { font-size: 22px; font-weight: 900; }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .count {
    background: #3B2723;
    color: #F5E6CA;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
  }
  .btn {
    background: #3B2723;
    color: #F5E6CA;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .btn:hover { opacity: 0.85; }
  .btn-excel {
    background: #1D6F42;
    color: #fff;
  }

  /* 필터 바 */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filter-bar label {
    font-size: 13px;
    font-weight: 700;
    color: #666;
  }
  .filter-bar select,
  .filter-bar input[type="date"] {
    font-family: 'Noto Sans KR', sans-serif;
    padding: 6px 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 13px;
    background: #fff;
  }
  .filter-bar .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* 테이블 */
  .table-wrap {
    background: #fff;
    border-radius: 14px;
    border: 1px solid #e0e0e0;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 800px;
  }
  thead th {
    background: #3B2723;
    color: #F5E6CA;
    padding: 12px 14px;
    text-align: left;
    font-weight: 700;
    white-space: nowrap;
    position: sticky;
    top: 0;
  }
  thead th:first-child { border-radius: 14px 0 0 0; }
  thead th:last-child { border-radius: 0 14px 0 0; }
  tbody tr { border-bottom: 1px solid #f0f0f0; }
  tbody tr:hover { background: #faf8f5; }
  tbody tr.checked { background: #f0f8f0; }
  tbody td {
    padding: 10px 14px;
    vertical-align: middle;
  }
  .phone-link {
    color: #3B2723;
    text-decoration: none;
    font-weight: 700;
  }
  .phone-link:hover { text-decoration: underline; }
  .interest-tag {
    display: inline-block;
    background: #FAF5ED;
    border: 1px solid #E8E2DA;
    border-radius: 100px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 700;
    color: #6B5550;
    margin: 1px 2px;
  }
  .memo-cell {
    max-width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #666;
    cursor: pointer;
  }
  .memo-cell:hover {
    white-space: normal;
    overflow: visible;
  }

  /* 확인 체크 */
  .check-cell {
    text-align: center;
  }
  .check-cell input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: #3B2723;
  }

  /* 삭제 */
  .delete-btn {
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
    color: #ccc;
    padding: 4px;
  }
  .delete-btn:hover { color: #ff4757; }

  /* 시간 뱃지 */
  .time-badge {
    font-size: 11px;
    color: #999;
    white-space: nowrap;
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: #999;
    font-size: 16px;
  }

  /* 통계 바 */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .stat-item {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 12px 20px;
    text-align: center;
    min-width: 120px;
  }
  .stat-num {
    font-size: 24px;
    font-weight: 900;
    color: #3B2723;
  }
  .stat-label {
    font-size: 12px;
    color: #999;
    margin-top: 2px;
  }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:12px">
    <img src="logo.png" alt="Savecore" style="height:32px">
    <h1>상담 접수 관리</h1>
  </div>
  <div class="header-right">
    <span class="count" id="totalCount">0건</span>
    <button class="btn" onclick="loadData()">새로고침</button>
    <button class="btn btn-excel" onclick="downloadExcel()">엑셀 다운로드</button>
  </div>
</div>

<div class="stats-bar" id="statsBar">
  <div class="stat-item">
    <div class="stat-num" id="statTotal">0</div>
    <div class="stat-label">전체 접수</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="statChecked">0</div>
    <div class="stat-label">확인 완료</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="statUnchecked">0</div>
    <div class="stat-label">미확인</div>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-group">
    <label>날짜</label>
    <input type="date" id="filterDate" onchange="applyFilter()">
  </div>
  <div class="filter-group">
    <label>시간대</label>
    <select id="filterTime" onchange="applyFilter()">
      <option value="">전체</option>
      <option value="09">09시</option>
      <option value="10">10시</option>
      <option value="11">11시</option>
      <option value="12">12시</option>
      <option value="13">13시</option>
      <option value="14">14시</option>
      <option value="15">15시</option>
      <option value="16">16시</option>
      <option value="17">17시</option>
      <option value="18">18시</option>
      <option value="19">19시</option>
      <option value="20">20시</option>
    </select>
  </div>
  <div class="filter-group">
    <label>상태</label>
    <select id="filterStatus" onchange="applyFilter()">
      <option value="">전체</option>
      <option value="checked">확인 완료</option>
      <option value="unchecked">미확인</option>
    </select>
  </div>
  <button class="btn" style="font-size:12px;padding:6px 12px" onclick="resetFilter()">초기화</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>확인</th>
        <th>#</th>
        <th>접수 시각</th>
        <th>병원명</th>
        <th>성함</th>
        <th>연락처</th>
        <th>시술건수</th>
        <th>관심항목</th>
        <th>메모</th>
        <th>삭제</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>
<div class="empty" id="emptyMsg" style="display:none">접수된 상담이 없습니다.</div>

<script>
const interestMap = {
  abutment: '커스텀 어버트먼트 50%',
  implant: '임플란트 단품주문',
  marketing: '마케팅'
};

const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
const ADMIN_API = isLocal ? '/api/admin/consultations' : 'https://script.google.com/macros/s/AKfycbyJk8H-F5Q1PdurNwBpLHC7wT_8-FAsEEEyBb7lri-8NQ1MZufRFZyjWKy3pI-SxRGn-g/exec';

let allRows = [];
let checkedIds = JSON.parse(localStorage.getItem('checkedIds') || '{}');

function loadData() {
  fetch(ADMIN_API)
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(rows => {
      allRows = rows;
      applyFilter();
    })
    .catch(err => {
      console.error('데이터 로드 실패:', err);
      document.getElementById('emptyMsg').style.display = 'block';
      document.getElementById('emptyMsg').textContent = '데이터를 불러올 수 없습니다. 새로고침 해주세요.';
    });
}

function applyFilter() {
  const dateVal = document.getElementById('filterDate').value;
  const timeVal = document.getElementById('filterTime').value;
  const statusVal = document.getElementById('filterStatus').value;

  let filtered = allRows.filter(row => {
    const dt = new Date(row.submitted_at || row.created_at);
    if (dateVal) {
      const rowDate = dt.toISOString().slice(0, 10);
      if (rowDate !== dateVal) return false;
    }
    if (timeVal) {
      const rowHour = String(dt.getHours()).padStart(2, '0');
      if (rowHour !== timeVal) return false;
    }
    if (statusVal === 'checked' && !checkedIds[row.id]) return false;
    if (statusVal === 'unchecked' && checkedIds[row.id]) return false;
    return true;
  });

  renderTable(filtered);
  updateStats();
}

function renderTable(rows) {
  document.getElementById('totalCount').textContent = rows.length + '건';
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyMsg');

  if (rows.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  tbody.innerHTML = rows.map(row => {
    let interests = [];
    try {
      if (typeof row.interest === 'string') {
        try { interests = JSON.parse(row.interest); } catch(e) {
          interests = row.interest.split(',').map(s => s.trim()).filter(Boolean);
        }
      } else if (Array.isArray(row.interest)) {
        interests = row.interest;
      }
    } catch(e) {}

    const tagsHtml = interests.map(i =>
      '<span class="interest-tag">' + (interestMap[i] || i) + '</span>'
    ).join('');

    const dt = new Date(row.submitted_at || row.created_at);
    const dateStr = dt.toLocaleDateString('ko-KR');
    const timeStr = dt.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    const isChecked = checkedIds[row.id] ? 'checked' : '';
    const rowClass = checkedIds[row.id] ? 'checked' : '';

    return `
      <tr class="${rowClass}" id="row-${row.id}">
        <td class="check-cell">
          <input type="checkbox" ${isChecked} onchange="toggleCheck(${row.id}, this)">
        </td>
        <td style="color:#999;font-weight:700">${row.id}</td>
        <td><span class="time-badge">${dateStr}<br>${timeStr}</span></td>
        <td style="font-weight:900">${esc(row.clinic)}</td>
        <td>${esc(row.name)}</td>
        <td><a href="tel:${row.phone}" class="phone-link">${esc(row.phone)}</a></td>
        <td style="text-align:center">${row.cases ? '월 ' + esc(String(row.cases)) + '건' : '-'}</td>
        <td>${tagsHtml || '-'}</td>
        <td class="memo-cell" title="${esc(row.memo || '')}">${esc(row.memo || '-')}</td>
        <td><button class="delete-btn" onclick="deleteItem(${row.id})" title="삭제">&times;</button></td>
      </tr>
    `;
  }).join('');
}

function updateStats() {
  const total = allRows.length;
  const checked = allRows.filter(r => checkedIds[r.id]).length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statChecked').textContent = checked;
  document.getElementById('statUnchecked').textContent = total - checked;
}

function toggleCheck(id, el) {
  if (el.checked) {
    checkedIds[id] = true;
  } else {
    delete checkedIds[id];
  }
  localStorage.setItem('checkedIds', JSON.stringify(checkedIds));
  const row = document.getElementById('row-' + id);
  if (row) row.className = el.checked ? 'checked' : '';
  updateStats();
}

function resetFilter() {
  document.getElementById('filterDate').value = '';
  document.getElementById('filterTime').value = '';
  document.getElementById('filterStatus').value = '';
  applyFilter();
}

function deleteItem(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  if (isLocal) {
    fetch('/api/admin/consultations/' + id, { method: 'DELETE' })
      .then(() => loadData());
  }
}

function downloadExcel() {
  if (allRows.length === 0) {
    alert('다운로드할 데이터가 없습니다.');
    return;
  }

  try {
    var tab = '\t';
    var lines = ['번호' + tab + '접수시각' + tab + '병원명' + tab + '성함' + tab + '연락처' + tab + '시술건수' + tab + '관심항목' + tab + '메모' + tab + '확인여부'];

    allRows.forEach(function(row) {
      var interests = [];
      try {
        if (typeof row.interest === 'string') {
          try { interests = JSON.parse(row.interest); } catch(e2) {
            interests = row.interest.split(',').map(function(s){ return s.trim(); }).filter(Boolean);
          }
        } else if (Array.isArray(row.interest)) {
          interests = row.interest;
        }
      } catch(e3) {}
      var interestStr = interests.map(function(i){ return interestMap[i] || i; }).join(' / ');

      var dt = new Date(row.submitted_at || row.created_at);
      var timeStr = dt.toLocaleString('ko-KR');
      var status = checkedIds[row.id] ? '확인완료' : '미확인';
      var phone = String(row.phone || '');

      lines.push(
        row.id + tab +
        timeStr + tab +
        (row.clinic || '') + tab +
        (row.name || '') + tab +
        phone + tab +
        (row.cases || '') + tab +
        interestStr + tab +
        (row.memo || '') + tab +
        status
      );
    });

    var content = '\uFEFF' + lines.join('\r\n');
    var blob = new Blob([content], { type: 'application/vnd.ms-excel;charset=utf-8;' });
    var filename = '상담접수_' + new Date().toISOString().slice(0, 10) + '.xls';

    if (window.navigator && window.navigator.msSaveOrOpenBlob) {
      window.navigator.msSaveOrOpenBlob(blob, filename);
    } else {
      var url = window.URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      window.URL.revokeObjectURL(url);
    }
  } catch(err) {
    alert('다운로드 오류: ' + err.message);
  }
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
